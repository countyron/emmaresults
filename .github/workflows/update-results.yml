name: Update Balmoral swim results

on:
  workflow_dispatch:
  schedule:
    - cron: '30 23 * * 5,6'
    - cron: '30 0 * * 6,0'
    - cron: '30 2 * * 6,0'

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install

      - run: npm run scrape

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          git diff --staged --quiet || git commit -m "Update Balmoral swim results"
          git push

<!doctype html>
<html lang="en-AU"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><meta name="theme-color" content="#073b4c"/><title>Balmoral Swim Pace Tracker</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script><style>
:root{--bg:#f6fbfd;--card:#fff;--ink:#10242c;--muted:#60717a;--line:#d8e4ea}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}header{padding:calc(14px + env(safe-area-inset-top)) 16px 14px;background:linear-gradient(135deg,#073b4c,#118ab2);color:#fff;position:sticky;top:0;z-index:10}h1{font-size:20px;margin:0 0 4px}.sub{font-size:13px;opacity:.9}.wrap{max-width:1300px;margin:0 auto;padding:14px}.panel,.card,.chartBox,.tableWrap{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 2px 8px #0000000d}.panel{padding:12px;margin-bottom:12px}.controls{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.control label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.control select,.control button{width:100%;font:inherit;border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px 12px}.modeBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}.active{background:#073b4c!important;color:white}.secondary{background:white;color:#073b4c}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.card{padding:12px}.metric{font-size:24px;font-weight:800}.label{font-size:12px;color:var(--muted)}.chartBox{height:380px;padding:12px;margin-bottom:12px}.tableWrap{overflow:auto;max-height:65vh}table{border-collapse:collapse;width:100%;font-size:13px}th,td{padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:left}th{position:sticky;top:0;background:#eef7fb;z-index:1}.pill{border-radius:999px;padding:3px 8px;font-weight:700}.sat{background:#dff1ff;color:#005b8a}.sun{background:#ffe3ea;color:#a5163a}.err{display:none;background:#fff2f2;border:1px solid #ffc6c6;color:#7a1010;padding:10px;border-radius:12px;margin-bottom:12px}@media(max-width:800px){.controls,.cards{grid-template-columns:1fr 1fr}.chartBox{height:340px}th,td{font-size:12px;padding:7px 8px}}</style></head><body><header><h1>Balmoral Swim Pace Tracker</h1><div class="sub" id="updated">Loading race data...</div></header><main class="wrap"><div class="err" id="err"></div><section class="panel"><div class="controls"><div class="control"><label>Select swimmer</label><select id="primarySelect"></select></div><div class="control"><label>Compare against</label><select id="comparisonSelect"></select></div><div class="control"><label>Graph mode</label><div class="modeBtns"><button id="singleBtn" class="secondary">Single</button><button id="compareBtn" class="active">Compare</button></div></div><div class="control"><label>Race filter</label><select id="seriesFilter"><option value="all">Saturday + Sunday</option><option value="Sat">Saturday only</option><option value="Sun">Sunday only</option></select></div></div></section><section class="cards"><div class="card"><div class="metric" id="swimmerCount">-</div><div class="label">Swimmers available</div></div><div class="card"><div class="metric" id="raceCount">-</div><div class="label">Visible race entries</div></div><div class="card"><div class="metric" id="latestPace">-</div><div class="label">Latest selected pace /100 m</div></div><div class="card"><div class="metric" id="bestPace">-</div><div class="label">Best selected pace /100 m</div></div></section><section class="chartBox"><canvas id="paceChart"></canvas></section><section class="tableWrap"><table><thead><tr><th>Date</th><th>Series</th><th>Swimmer</th><th>Distance</th><th>Total swimmers</th><th>Elapsed time</th><th>Average pace</th><th>Elapsed pos.</th><th>Elapsed %</th><th>Handicap</th><th>Adjusted time</th><th>Adjusted pos.</th><th>Adjusted %</th></tr></thead><tbody id="rows"></tbody></table></section></main><script>
(function(){var rawData=null,chart=null,mode='compare';var colours=['#0077b6','#ef476f','#06d6a0','#ffb703','#8338ec','#fb5607','#3a86ff'];function id(x){return document.getElementById(x)}function esc(v){return String(v??'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function fmtPace(sec){if(!Number.isFinite(sec))return'-';var m=Math.floor(sec/60);var s=Math.round(sec%60).toString().padStart(2,'0');return m+':'+s}function fmtDate(iso){var d=new Date(iso+'T00:00:00');return Number.isNaN(d.getTime())?iso:d.toLocaleDateString('en-AU',{weekday:'short',day:'2-digit',month:'short'})}function pct(v){return Number.isFinite(v)?v.toFixed(1)+'%':'-'}function names(){return rawData?.swimmers?.map(s=>s.name)||[]}function all(){var out=[];(rawData?.swimmers||[]).forEach(s=>(s.races||[]).forEach(r=>{if(Number.isFinite(r.average_pace_seconds_per_100m)){out.push({...r,swimmer:s.name})}}));return out}function selected(){var a=id('primarySelect').value,b=id('comparisonSelect').value;return mode==='single'||!b||a===b?[a]:[a,b]}function visible(){var f=id('seriesFilter').value, chosen=selected();return all().filter(r=>(f==='all'||r.series===f)&&chosen.includes(r.swimmer)).sort((a,b)=>a.date.localeCompare(b.date)||a.swimmer.localeCompare(b.swimmer))}function draw(){var races=visible(), base=id('primarySelect').value, br=all().filter(r=>r.swimmer===base).sort((a,b)=>a.date.localeCompare(b.date));id('swimmerCount').textContent=names().length;id('raceCount').textContent=races.length;id('latestPace').textContent=br.length?fmtPace(br.at(-1).average_pace_seconds_per_100m):'-';id('bestPace').textContent=br.length?fmtPace(Math.min(...br.map(r=>r.average_pace_seconds_per_100m))):'-';id('rows').innerHTML=races.map(r=>'<tr><td>'+esc(fmtDate(r.date))+'</td><td><span class="pill '+esc(String(r.series).toLowerCase())+'">'+esc(r.series)+'</span></td><td>'+esc(r.swimmer)+'</td><td>'+esc((r.distance_m||'')+' m')+'</td><td>'+esc(r.total_swimmers??'-')+'</td><td>'+esc(r.elapsed_time_raw||'-')+'</td><td>'+esc((r.average_pace_raw||fmtPace(r.average_pace_seconds_per_100m))+' /100')+'</td><td>'+esc(r.elapsed_position?`${r.elapsed_position} / ${r.total_swimmers}`:'-')+'</td><td>'+esc(pct(r.elapsed_position_percent))+'</td><td>'+esc(r.handicap_time_raw||'-')+'</td><td>'+esc(r.adjusted_time_raw||'-')+'</td><td>'+esc(r.adjusted_position?`${r.adjusted_position} / ${r.total_swimmers}`:'-')+'</td><td>'+esc(pct(r.adjusted_position_percent))+'</td></tr>').join('');chartIt(races)}function chartIt(races){if(typeof Chart==='undefined')return;var labels=Array.from(new Set(races.map(r=>r.date))).sort();var datasets=selected().map((n,i)=>({label:n,data:labels.map(d=>{var r=races.find(x=>x.swimmer===n&&x.date===d);return r?r.average_pace_seconds_per_100m:null}),borderColor:colours[i%colours.length],backgroundColor:colours[i%colours.length],borderWidth:2,tension:.25,pointRadius:4,spanGaps:false}));if(chart)chart.destroy();chart=new Chart(id('paceChart'),{type:'line',data:{labels:labels.map(fmtDate),datasets},options:{responsive:true,maintainAspectRatio:false,scales:{y:{title:{display:true,text:'Pace /100 m'},ticks:{callback:function(v){return fmtPace(v)}}}},plugins:{tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmtPace(ctx.parsed.y)+' /100 m'}}}}}})}async function load(){try{var res=await fetch('data/results.json?cache='+Date.now());if(!res.ok)throw new Error('Could not load data/results.json HTTP '+res.status);rawData=await res.json();id('updated').textContent='Last updated: '+(rawData.last_updated||'unknown')+' · Source: Balmoral Beach Club';var ns=names(), primary=rawData.primarySwimmer||'Bennett, Emma';id('primarySelect').innerHTML=ns.map(n=>'<option '+(n===primary?'selected':'')+'>'+esc(n)+'</option>').join('');id('comparisonSelect').innerHTML='<option value="">Select swimmer...</option>'+ns.filter(n=>n!==primary).map(n=>'<option>'+esc(n)+'</option>').join('');id('singleBtn').onclick=function(){mode='single';this.className='active';id('compareBtn').className='secondary';draw()};id('compareBtn').onclick=function(){mode='compare';this.className='active';id('singleBtn').className='secondary';draw()};['primarySelect','comparisonSelect','seriesFilter'].forEach(x=>id(x).onchange=draw);draw()}catch(e){id('err').style.display='block';id('err').textContent='App load error: '+e.message;console.error(e)}}load()})();
</script></body></html>
